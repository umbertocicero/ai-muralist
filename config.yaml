# AI Muralist — site configuration (optional; every key may be omitted).
# These are the SITE OWNER's switches; visitors can override mode/model/api key
# for themselves from the in-app Settings panel (stored in their browser only).

# Persist painted murals to the Worker's D1 database (needs worker_url and the
# [[d1_databases]] binding in wrangler.toml). false = never save.
save_murals: true

# Worker endpoint for AI generation + persistence. Needed for save/restore
# even in demo mode (the D1 database lives behind the Worker).
worker_url: https://ai-muralist-proxy.ucicero.workers.dev

# Claude model used for generation.
# model: claude-sonnet-4-6

# Force a mode: demo | ai. Default: auto (ai when a worker/api key is set).
# mode: demo

# Live shared Kay (needs worker_url + the [[durable_objects]] KAY binding in
# wrangler.toml). true (default) = one server-authoritative Kay every browser
# shares, who picks and paints walls himself and freezes when nobody's watching.
# false = the old per-browser local Kay.
# live: true

# Owner login (Google Sign-In) — restrict privileged actions (delete murals,
# change the shared demo/AI mode) to you. Both values are PUBLIC. Create an OAuth
# 2.0 "Web application" Client ID in Google Cloud Console (add your site to the
# Authorized JavaScript origins) and paste it here. The ENFORCED allowlist is the
# Worker's OWNER_EMAILS var — this owner_email only decides which controls show.
# Leave unset to keep the app fully open (no login, admin controls hidden).
google_client_id: 770761258898-i54mo39rfc81l7djutddd0qhdej1co00.apps.googleusercontent.com
owner_email: umbertocicero@gmail.com
