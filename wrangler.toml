name = "ai-muralist-proxy"
main = "worker.js"
compatibility_date = "2024-09-23"

# Live shared Kay (optional). A single Durable Object per world runs the ONE
# authoritative simulation every browser connects to at <worker>/live. Deploy
# with the migration below applied (it ships in this file). Without this binding
# the Worker still runs — each browser just falls back to its own local Kay.
# SQLite-backed Durable Objects are available on the free plan.
[[durable_objects.bindings]]
name = "KAY"
class_name = "KayDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["KayDO"]

# Optional pace/model overrides for the server-side painter (Kay bills the site
# ANTHROPIC_API_KEY autonomously). Set as vars or secrets, e.g.:
#   KAY_COOLDOWN_MIN (default 20s)   KAY_COOLDOWN_RANGE (default 20s)
#   KAY_THINK / KAY_PAINT / KAY_ADMIRE   KAY_MODEL (default claude-sonnet-4-6)

# Rate-limiting store. Create it once with:
#   wrangler kv:namespace create RATE_LIMIT_KV
# then paste the returned id below. The binding is optional — if removed,
# the Worker still runs but without per-IP rate limiting.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "196719ebd6324e0d979b769a52dd19e1"

# Persistent murals (optional). Create the database and apply the schema:
#   wrangler d1 create ai-muralist-db
#   wrangler d1 execute ai-muralist-db --remote --file=schema.sql
# then paste the returned database_id below and `wrangler deploy`. Without this
# binding the Worker still runs — murals just don't survive a refresh.
#
[[d1_databases]]
binding = "DB"
database_name = "ai-muralist-db"
database_id = "363b925a-31c2-475a-9819-f801a4cf9b0e"

# The Anthropic API key is a SECRET, never put it here. Set it with:
#   wrangler secret put ANTHROPIC_API_KEY


[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1