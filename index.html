<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AI Muralist — Autonomous Street Art</title>
<meta name="description" content="An autonomous AI agent wanders a tiny 3D city and paints murals generated in real time by Claude." />
<meta property="og:title" content="AI Muralist" />
<meta property="og:description" content="An autonomous AI street artist painting murals in a tiny 3D city. Forever." />
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
    "vue":   "https://cdn.jsdelivr.net/npm/vue@3.4.38/dist/vue.esm-browser.prod.js"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; }
  #canvas-root { position: fixed; inset: 0; }
  #ui-root { position: fixed; inset: 0; pointer-events: none; }
  canvas { display: block; }

  .ui { position: fixed; z-index: 10; pointer-events: none; font-family: 'Courier New', monospace; color: #1a1a1a; }
  .panel {
    background: rgba(245, 240, 230, 0.88);
    border: 1px solid rgba(0, 0, 0, 0.12);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    padding: 12px 16px; border-radius: 2px;
  }

  #title { top: 18px; left: 18px; }
  #title .exp { font-size: 11px; letter-spacing: 2px; color: #666655; }
  #title .name { font-size: 22px; font-weight: bold; letter-spacing: 3px; margin: 2px 0; }
  #title .sub { font-size: 11px; letter-spacing: 1px; color: #666655; }
  #title .accent { color: #ff6b35; }

  #log { top: 18px; right: 18px; width: 230px; }
  #log .hdr { font-size: 10px; letter-spacing: 2px; color: #666655; margin-bottom: 8px; }
  #log .entry { font-size: 11px; line-height: 1.5; padding: 4px 0; border-top: 1px solid rgba(0,0,0,0.08); transition: color 0.15s; }
  #log .entry.clickable { pointer-events: auto; cursor: pointer; }
  #log .entry.clickable:hover { color: #ff6b35; }
  #log .entry.clickable:hover .meta { color: #ff6b35; }
  #log .entry .n { color: #ff6b35; font-weight: bold; }
  #log .entry .meta { color: #666655; font-size: 10px; }
  #log .empty { font-size: 11px; color: #999; font-style: italic; }

  /* ── Mural gallery: a slide-out right drawer with EVERY mural ─────────────
     Opened by a handle pinned to the right edge; flies the camera to a piece
     on click. The recent-log panel above stays as a quick live HUD. */
  :root { --gw: 320px; }
  #gallery-tab {
    z-index: 12; pointer-events: auto;
    top: 50%; right: 0; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 12px 7px;
    background: rgba(245, 240, 230, 0.92);
    border: 1px solid rgba(0, 0, 0, 0.14); border-right: none;
    border-radius: 7px 0 0 7px;
    cursor: pointer; color: #1a1a1a;
    transition: right 0.34s cubic-bezier(.4,0,.2,1), background 0.2s, color 0.2s;
  }
  #gallery-tab:hover { background: #ff6b35; color: #fff; }
  #gallery-tab .ico { font-size: 14px; line-height: 1; }
  #gallery-tab .lbl { font-size: 9px; letter-spacing: 2px; writing-mode: vertical-rl; text-orientation: mixed; }
  #gallery-tab .cnt { font-size: 10px; font-weight: bold; color: #ff6b35; background: #fff; border-radius: 9px; padding: 1px 5px; }
  #gallery-tab.open { right: var(--gw); background: #ff6b35; color: #fff; }
  #gallery-tab.open .cnt { color: #ff6b35; }

  #gallery {
    z-index: 11; pointer-events: auto;
    top: 18px; bottom: 18px; right: 0; width: var(--gw);
    display: flex; flex-direction: column; padding: 0; overflow: hidden;
    transform: translateX(105%);
    transition: transform 0.34s cubic-bezier(.4,0,.2,1);
  }
  #gallery.open { transform: translateX(0); }
  #gallery .g-hdr {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; font-size: 10px; letter-spacing: 2px; color: #666655;
    border-bottom: 1px solid rgba(0, 0, 0, 0.12);
  }
  #gallery .g-hdr .g-count { color: #ff6b35; font-weight: bold; font-size: 12px; }
  #gallery .g-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 10px 12px; }
  #gallery .g-item {
    display: flex; gap: 10px; align-items: center;
    padding: 7px 4px; border-top: 1px solid rgba(0, 0, 0, 0.07);
    transition: color 0.15s;
  }
  #gallery .g-item:first-child { border-top: none; }
  #gallery .g-item.clickable { cursor: pointer; }
  #gallery .g-item.clickable:hover { color: #ff6b35; }
  #gallery .g-item.clickable:hover .g-meta { color: #ff6b35; }
  #gallery .g-thumb {
    width: 56px; height: 56px; flex: 0 0 56px; background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.15); border-radius: 2px; overflow: hidden;
  }
  #gallery .g-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #gallery .g-info { min-width: 0; }
  #gallery .g-title { font-size: 12px; line-height: 1.4; }
  #gallery .g-title .n { color: #ff6b35; font-weight: bold; }
  #gallery .g-meta { font-size: 10px; color: #666655; }
  #gallery .g-empty { font-size: 11px; color: #999; font-style: italic; padding: 14px 16px; }

  #status { bottom: 18px; left: 18px; display: flex; align-items: center; gap: 10px; }
  #status .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff6b35; animation: pulse 1.4s ease-in-out infinite; }
  #status .label { font-size: 12px; letter-spacing: 1px; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.7); } }

  #counter { bottom: 18px; right: 18px; text-align: right; }
  #counter .num { font-size: 40px; font-weight: bold; line-height: 1; color: #ff6b35; }
  #counter .cap { font-size: 10px; letter-spacing: 2px; color: #666655; margin-top: 2px; }

  #thought { bottom: 90px; left: 50%; transform: translateX(-50%); max-width: min(560px, 86vw); text-align: center; opacity: 0; transition: opacity 0.5s ease; }
  #thought.show { opacity: 1; }
  #thought .tip { font-size: 10px; letter-spacing: 3px; color: #ff6b35; margin-bottom: 6px; }
  #thought .text { font-size: 17px; line-height: 1.4; font-style: italic; }

  #flash { position: fixed; inset: 0; z-index: 9; pointer-events: none; background: radial-gradient(circle at center, rgba(255,107,53,0.18), transparent 70%); opacity: 0; transition: opacity 0.4s ease; }
  #flash.on { opacity: 1; }

  #boot { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; background: #87CEEB; font-family: 'Courier New', monospace; color: #1a1a1a; transition: opacity 0.8s ease; pointer-events: all; }
  #boot.hide { opacity: 0; pointer-events: none; }
  #boot .b-name { font-size: 18px; letter-spacing: 4px; font-weight: bold; }
  #boot .b-sub { font-size: 11px; letter-spacing: 2px; color: #4a5a66; }
  #boot.error .b-sub { color: #c0392b; }

  #follow-btn {
    position: fixed; z-index: 10;
    bottom: 18px; left: 50%; transform: translateX(-50%);
    display: none;
    align-items: center; gap: 8px;
    padding: 10px 20px;
    background: rgba(245, 240, 230, 0.95);
    border: 1.5px solid #ff6b35;
    border-radius: 2px;
    font-family: 'Courier New', monospace;
    font-size: 12px; letter-spacing: 2px;
    color: #ff6b35; cursor: pointer;
    pointer-events: all;
    transition: background 0.2s, color 0.2s;
  }
  #follow-btn:hover { background: #ff6b35; color: #fff; }
  #follow-btn.visible { display: flex; }
  #follow-btn .icon { font-size: 15px; line-height: 1; }

  /* "Right the world" control — only shown when the horizon is rolled */
  #reset-btn {
    position: fixed; z-index: 10;
    bottom: 56px; left: 18px;
    display: none; align-items: center; gap: 7px;
    padding: 8px 14px;
    background: rgba(245, 240, 230, 0.92);
    border: 1.5px solid #4a5a66;
    border-radius: 2px;
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: #4a5a66; cursor: pointer;
    pointer-events: all;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  #reset-btn:hover { background: #4a5a66; color: #fff; }
  #reset-btn.visible { display: flex; }
  #reset-btn .icon { font-size: 15px; line-height: 1; }

  canvas { cursor: grab; touch-action: none; }
  canvas:active { cursor: grabbing; }

  /* ── Live city map: MAP button + full-screen overlay ────────────────────── */
  #map-btn {
    position: fixed; z-index: 12; pointer-events: auto;
    top: 118px; left: 18px;
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px;
    background: rgba(245, 240, 230, 0.92);
    border: 1.5px solid #4a5a66; border-radius: 2px;
    font-family: 'Courier New', monospace;
    font-size: 11px; letter-spacing: 2px;
    color: #4a5a66; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  #map-btn:hover, #map-btn.open { background: #4a5a66; color: #fff; }
  #map-btn .ico { color: #ff6b35; }
  #map-btn.open .ico { color: #ffd0bd; }

  /* ── Settings: ⚙ button + paper card ─────────────────────────────────────── */
  #settings-btn {
    position: fixed; z-index: 12; pointer-events: auto;
    top: 160px; left: 18px;
    padding: 7px 12px;
    background: rgba(245, 240, 230, 0.92);
    border: 1.5px solid #4a5a66; border-radius: 2px;
    font-family: 'Courier New', monospace;
    font-size: 14px; line-height: 1;
    color: #4a5a66; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  #settings-btn:hover { background: #4a5a66; color: #fff; }
  #settings-panel {
    position: fixed; z-index: 27; pointer-events: auto;
    top: 160px; left: 66px;
    width: min(320px, 86vw);
    font-family: 'Courier New', monospace; color: #1a1a1a;
  }
  #settings-panel .s-hdr { font-size: 11px; letter-spacing: 3px; color: #ff6b35; margin-bottom: 8px; }
  #settings-panel .s-lab { display: block; font-size: 10px; letter-spacing: 1.5px; color: #666655; margin: 9px 0 3px; }
  #settings-panel .s-note { letter-spacing: 0; text-transform: none; color: #999; }
  #settings-panel .s-in {
    width: 100%; padding: 6px 8px;
    font-family: inherit; font-size: 12px;
    background: #fffdf8; color: #1a1a1a;
    border: 1px solid rgba(0,0,0,0.25); border-radius: 2px;
  }
  #settings-panel .s-row { display: flex; gap: 12px; font-size: 11px; align-items: center; }
  #settings-panel .s-row label { display: flex; gap: 4px; align-items: center; cursor: pointer; }
  #settings-panel .s-save { margin-top: 12px; font-size: 11px; gap: 6px; cursor: pointer; }
  #settings-panel .s-actions { margin-top: 12px; }
  #settings-panel .s-btn {
    padding: 7px 12px; cursor: pointer;
    font-family: inherit; font-size: 10px; letter-spacing: 2px;
    background: #ff6b35; color: #fff;
    border: 1.5px solid #ff6b35; border-radius: 2px;
  }
  #settings-panel .s-btn.ghost { background: transparent; color: #4a5a66; border-color: #4a5a66; }

  #map-overlay {
    position: fixed; inset: 0; z-index: 28; pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    background: rgba(24, 22, 19, 0.55);
  }
  #map-overlay .m-wrap { position: relative; }
  #map-overlay canvas {
    display: block; cursor: default; touch-action: auto;
    width: min(88vmin, 900px); height: min(88vmin, 900px);
    border: 3px solid #1a1814; border-radius: 3px;
    background: #f4f1ea;
    box-shadow: 0 18px 60px rgba(0,0,0,0.5);
  }
  #map-overlay .m-close {
    position: absolute; top: -14px; right: -14px; z-index: 1;
    width: 34px; height: 34px; border-radius: 50%;
    background: #ff6b35; color: #fff; border: 2px solid #1a1814;
    font-family: 'Courier New', monospace; font-size: 15px; font-weight: bold;
    cursor: pointer; line-height: 1;
  }

  /* ── Mobile layout (phones) — tuned for one-handed, notch/home-bar safe ──── */
  @media (max-width: 640px) {
    .panel { padding: 7px 11px; }

    /* Title: just the wordmark, top-left (drop the two sub-lines to declutter) */
    #title { top: calc(env(safe-area-inset-top, 0px) + 10px); left: 10px; }
    #title .exp, #title .sub { display: none; }
    #title .name { font-size: 15px; letter-spacing: 2px; margin: 0; }

    /* Mural log stays hidden, but show the latest mural via the counter cap */
    #log { display: none; }

    /* Bottom HUD: status left, counter right, lifted clear of the home bar */
    #status { bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); left: 10px; max-width: 52vw; }
    #status .label { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    #counter { bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); right: 10px; }
    #counter .num { font-size: 28px; }
    #counter .cap { font-size: 9px; }

    /* Thought sits above the bottom HUD, centred between the two corner buttons */
    #thought { bottom: calc(env(safe-area-inset-bottom, 0px) + 116px); }
    #thought .text { font-size: 15px; }
    /* Follow + Reset share one bottom row but are pinned to OPPOSITE edges, so
       they can never overlap (and never intercept each other's taps) however
       narrow the phone is. The thought bubble keeps the free centre above them. */
    #follow-btn { bottom: calc(env(safe-area-inset-bottom, 0px) + 76px); left: auto; right: 10px; transform: none; padding: 9px 16px; font-size: 11px; }
    #reset-btn  { bottom: calc(env(safe-area-inset-bottom, 0px) + 76px); left: 10px; right: auto; padding: 7px 12px; font-size: 10px; }

    /* Map button under the compact title; overlay canvas fills the phone width */
    #map-btn { top: calc(env(safe-area-inset-top, 0px) + 52px); left: 10px; padding: 7px 11px; font-size: 10px; }
    #map-overlay canvas { width: 94vmin; height: 94vmin; }
    #map-overlay .m-close { top: -10px; right: -6px; }

    /* The full gallery IS the mobile mural list (the recent-log HUD is hidden):
       a near-full-width drawer, safe-area aware, reachable from the edge handle. */
    :root { --gw: 86vw; }
    #gallery { top: calc(env(safe-area-inset-top, 0px) + 8px); bottom: calc(env(safe-area-inset-bottom, 0px) + 8px); }
    #gallery-tab { padding: 10px 6px; }
    #gallery .g-thumb { width: 52px; height: 52px; flex: 0 0 52px; }
  }
</style>
</head>
<body>
  <div id="canvas-root"></div>
  <div id="ui-root"></div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
