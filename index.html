<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AI Muralist — Autonomous Street Art</title>
<meta name="description" content="An autonomous AI agent wanders a tiny 3D city and paints murals generated in real time by Claude." />
<meta property="og:title" content="AI Muralist" />
<meta property="og:description" content="An autonomous AI street artist painting murals in a tiny 3D city. Forever." />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; }
  #app { position: fixed; inset: 0; }
  canvas { display: block; }

  .ui { position: fixed; z-index: 10; pointer-events: none; font-family: 'Courier New', monospace; color: #1a1a1a; }
  .panel {
    background: rgba(245, 240, 230, 0.88);
    border: 1px solid rgba(0, 0, 0, 0.12);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    padding: 12px 16px; border-radius: 2px;
  }

  #title { top: 18px; left: 18px; }
  #title .exp { font-size: 11px; letter-spacing: 2px; color: #666655; }
  #title .name { font-size: 22px; font-weight: bold; letter-spacing: 3px; margin: 2px 0; }
  #title .sub { font-size: 11px; letter-spacing: 1px; color: #666655; }
  #title .accent { color: #ff6b35; }

  #log { top: 18px; right: 18px; width: 230px; }
  #log .hdr { font-size: 10px; letter-spacing: 2px; color: #666655; margin-bottom: 8px; }
  #log .entry { font-size: 11px; line-height: 1.5; padding: 4px 0; border-top: 1px solid rgba(0,0,0,0.08); }
  #log .entry .n { color: #ff6b35; font-weight: bold; }
  #log .entry .meta { color: #666655; font-size: 10px; }
  #log .empty { font-size: 11px; color: #999; font-style: italic; }

  #status { bottom: 18px; left: 18px; display: flex; align-items: center; gap: 10px; }
  #status .dot { width: 9px; height: 9px; border-radius: 50%; background: #ff6b35; animation: pulse 1.4s ease-in-out infinite; }
  #status .label { font-size: 12px; letter-spacing: 1px; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.35; transform: scale(0.7); } }

  #counter { bottom: 18px; right: 18px; text-align: right; }
  #counter .num { font-size: 40px; font-weight: bold; line-height: 1; color: #ff6b35; }
  #counter .cap { font-size: 10px; letter-spacing: 2px; color: #666655; margin-top: 2px; }

  #thought { bottom: 90px; left: 50%; transform: translateX(-50%); max-width: min(560px, 86vw); text-align: center; opacity: 0; transition: opacity 0.5s ease; }
  #thought.show { opacity: 1; }
  #thought .tip { font-size: 10px; letter-spacing: 3px; color: #ff6b35; margin-bottom: 6px; }
  #thought .text { font-size: 17px; line-height: 1.4; font-style: italic; }

  #flash { position: fixed; inset: 0; z-index: 9; pointer-events: none; background: radial-gradient(circle at center, rgba(255,107,53,0.18), transparent 70%); opacity: 0; transition: opacity 0.4s ease; }
  #flash.on { opacity: 1; }

  #boot { position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; background: #87CEEB; font-family: 'Courier New', monospace; color: #1a1a1a; transition: opacity 0.8s ease; }
  #boot.hide { opacity: 0; pointer-events: none; }
  #boot .b-name { font-size: 18px; letter-spacing: 4px; font-weight: bold; }
  #boot .b-sub { font-size: 11px; letter-spacing: 2px; color: #4a5a66; }
  #boot.error .b-sub { color: #c0392b; }

  @media (max-width: 640px) {
    #log { display: none; }
    #title .name { font-size: 18px; }
    #thought .text { font-size: 15px; }
    #counter .num { font-size: 32px; }
  }
</style>
</head>
<body>
  <div id="app"></div>
  <div id="flash"></div>

  <div id="title" class="ui panel">
    <div class="exp">EXPERIMENT №001</div>
    <div class="name">AI <span class="accent">MURALIST</span></div>
    <div class="sub">Autonomous street art · powered by Claude</div>
  </div>

  <div id="log" class="ui panel">
    <div class="hdr">RECENT MURALS</div>
    <div id="log-body"><div class="empty">no murals yet…</div></div>
  </div>

  <div id="status" class="ui panel">
    <div class="dot"></div>
    <div class="label" id="status-label">booting…</div>
  </div>

  <div id="counter" class="ui panel">
    <div class="num" id="counter-num">0</div>
    <div class="cap">MURALS CREATED</div>
  </div>

  <div id="thought" class="ui">
    <div class="panel">
      <div class="tip">AI IS THINKING</div>
      <div class="text" id="thought-text"></div>
    </div>
  </div>

  <div id="boot">
    <div class="b-name">AI MURALIST</div>
    <div class="b-sub" id="boot-sub">loading the city…</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  'use strict';
  (function () {

  // ==========================================================================
  //  CONFIG — every tunable in one place
  // ==========================================================================
  const CONFIG = {
    // --- API ---
    // Worker proxy endpoint. After `wrangler deploy`, set this to your worker URL
    // (e.g. "https://ai-muralist-proxy.<account>.workers.dev") or "/api/claude"
    // when using Pages Functions. Leave null to run the OFFLINE DEMO mode.
    workerUrl: null,
    model: 'claude-sonnet-4-6',
    maxTokens: 2048,
    requestTimeoutMs: 30000,
    maxSvgBytes: 60000,

    // --- World ---
    sky: '#87CEEB',
    fog: { color: '#c9e8f5', near: 40, far: 90 },
    buildingColors: ['#d4c9b8', '#c2b9a7', '#b8c4c2', '#cfc8be'],
    buildingPositions: [
      [-12,-12],[12,-12],[-12,12],[12,12],
      [-30,-12],[-30,12],[30,-12],[30,12],
      [-12,-30],[12,-30],[-12,30],[12,30],
      [-30,-30],[30,-30],[-30,30],[30,30],
    ],

    // --- Agent / physics ---
    charRadius: 0.4,
    moveSpeed: 3.2,            // units / second
    approachOffset: 1.5,      // distance the agent stands from the wall
    wanderMin: 3.5,           // min seconds of wandering before it may paint
    wanderRange: 4.0,         // + up to this many extra seconds (deterministic per cycle)
    thinkSeconds: 2.0,
    paintSeconds: 2.2,
    muralCoverW: 0.88,        // fraction of wall width covered
    muralCoverH: 0.85,

    // --- Camera ---
    camFov: 55,
    camDistance: 22,
    camHeight: 14,
    camOrbitSpeed: 0.08,      // rad / second
    camFollowLerp: 0.02,

    // --- UI ---
    maxLogEntries: 5,
    styleNames: ['Bauhaus','Organic','Pixel','Op-Art','Surreal','Graffiti','Cosmos','Botanical'],
  };

  const ORANGE = '#ff6b35';
  const SVG_FORBIDDEN = /<\s*(script|foreignObject|image|use|symbol|iframe)\b|xlink:href|(?<![a-z])href\s*=|url\s*\(/i;

  // ==========================================================================
  //  small math helpers
  // ==========================================================================
  const rand = (a, b) => a + Math.random() * (b - a);
  const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
  function lerpAngle(a, b, f) {
    let d = b - a;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    return a + d * f;
  }
  function rotateY2D(v, angle) {
    const c = Math.cos(angle), s = Math.sin(angle);
    return { x: v.x * c - v.z * s, z: v.x * s + v.z * c };
  }

  // ==========================================================================
  //  CITY — builds geometry, collision boxes and wall slots
  // ==========================================================================
  class City {
    constructor(scene) {
      this.scene = scene;
      this.bboxes = [];
      this.wallSlots = [];
      this._buildGround();
      this._buildBuildings();
    }

    _buildGround() {
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(200, 200),
        new THREE.MeshStandardMaterial({ color: '#9a9a9a', roughness: 1 })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      this.scene.add(ground);

      const addRoad = (x, z, w, d) => {
        const r = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshStandardMaterial({ color: '#6e6e6e', roughness: 1 }));
        r.rotation.x = -Math.PI / 2; r.position.set(x, 0.01, z); r.receiveShadow = true; this.scene.add(r);
      };
      addRoad(0, 0, 6, 200); addRoad(0, 0, 200, 6);
      [-20, 20].forEach(c => { addRoad(c, 0, 5, 200); addRoad(0, c, 200, 5); });

      const addSidewalk = (x, z, w, d) => {
        const s = new THREE.Mesh(new THREE.PlaneGeometry(w, d), new THREE.MeshStandardMaterial({ color: '#b8b4ac', roughness: 1 }));
        s.rotation.x = -Math.PI / 2; s.position.set(x, 0.05, z); s.receiveShadow = true; this.scene.add(s);
      };
      [-3.6, 3.6].forEach(o => { addSidewalk(o, 0, 1, 200); addSidewalk(0, o, 200, 1); });
    }

    _buildBuildings() {
      const cols = CONFIG.buildingColors;
      const configs = CONFIG.buildingPositions.map(([x, z], i) => ({
        x, z, w: 7 + (i % 3), d: 7 + ((i + 1) % 3), h: 4 + (i % 4), color: cols[i % cols.length],
      }));

      configs.forEach((cfg, idx) => {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(cfg.w, cfg.h, cfg.d),
          new THREE.MeshStandardMaterial({ color: cfg.color, roughness: 0.85 })
        );
        mesh.position.set(cfg.x, cfg.h / 2, cfg.z);
        mesh.castShadow = mesh.receiveShadow = true;
        this.scene.add(mesh);

        // Collision box, padded by the character radius.
        const r = CONFIG.charRadius;
        this.bboxes.push({ minX: cfg.x - cfg.w/2 - r, maxX: cfg.x + cfg.w/2 + r, minZ: cfg.z - cfg.d/2 - r, maxZ: cfg.z + cfg.d/2 + r });

        // Four wall slots (N +z, S -z, E +x, W -x).
        const py = cfg.h / 2;
        this.wallSlots.push({ px: cfg.x, py, pz: cfg.z + cfg.d/2, nx: 0,  nz: 1,  wallW: cfg.w, wallH: cfg.h, buildingIdx: idx, used: false, mesh: null });
        this.wallSlots.push({ px: cfg.x, py, pz: cfg.z - cfg.d/2, nx: 0,  nz: -1, wallW: cfg.w, wallH: cfg.h, buildingIdx: idx, used: false, mesh: null });
        this.wallSlots.push({ px: cfg.x + cfg.w/2, py, pz: cfg.z, nx: 1,  nz: 0,  wallW: cfg.d, wallH: cfg.h, buildingIdx: idx, used: false, mesh: null });
        this.wallSlots.push({ px: cfg.x - cfg.w/2, py, pz: cfg.z, nx: -1, nz: 0,  wallW: cfg.d, wallH: cfg.h, buildingIdx: idx, used: false, mesh: null });

        if (idx % 3 === 0) this._addLamppost(cfg);
      });
    }

    _addLamppost(cfg) {
      const lx = cfg.x + (cfg.w / 2 + 1.4) * (cfg.x >= 0 ? 1 : -1);
      const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 4, 8), new THREE.MeshStandardMaterial({ color: '#3a3a3a', roughness: 0.6 }));
      post.position.set(lx, 2, cfg.z); post.castShadow = true; this.scene.add(post);
      const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12), new THREE.MeshStandardMaterial({ color: '#fff3c4', emissive: '#ffe07a', emissiveIntensity: 0.6 }));
      bulb.position.set(lx, 4.1, cfg.z); this.scene.add(bulb);
    }

    // --- collision queries ---
    isColliding(x, z) {
      const b = this.bboxes;
      for (let i = 0; i < b.length; i++) {
        const o = b[i];
        if (x > o.minX && x < o.maxX && z > o.minZ && z < o.maxZ) return true;
      }
      return false;
    }

    randomReachablePoint() {
      for (let i = 0; i < 30; i++) {
        const x = rand(-35, 35), z = rand(-35, 35);
        if (!this.isColliding(x, z)) return { x, z };
      }
      return { x: 0, z: 0 };
    }

    approachPoint(slot) {
      return { x: slot.px + slot.nx * CONFIG.approachOffset, z: slot.pz + slot.nz * CONFIG.approachOffset };
    }
    isApproachFree(slot) {
      const p = this.approachPoint(slot);
      return !this.isColliding(p.x, p.z);
    }
    pickFreeSlot() {
      const free = this.wallSlots.filter(s => !s.used && this.isApproachFree(s));
      return free.length ? free[(Math.random() * free.length) | 0] : null;
    }
    allWallsUsed() { return this.wallSlots.every(s => s.used); }

    // Steer one step toward a target with obstacle avoidance + wall sliding.
    // Returns the chosen direction {x,z} or null if fully stuck.
    steer(pos, target, dist) {
      const dx = target.x - pos.x, dz = target.z - pos.z;
      const len = Math.hypot(dx, dz) || 1;
      const dir = { x: dx / len, z: dz / len };
      for (let attempt = 0; attempt < 12; attempt++) {
        const sign = attempt % 2 === 0 ? 1 : -1;
        const steps = (attempt / 2) | 0;
        const rot = rotateY2D(dir, sign * steps * (Math.PI / 12));
        const nx = pos.x + rot.x * dist, nz = pos.z + rot.z * dist;
        if (!this.isColliding(nx, nz)) { pos.x = nx; pos.z = nz; return rot; }
      }
      return null;
    }
  }

  // ==========================================================================
  //  CHARACTER — composite mesh + animation states
  // ==========================================================================
  class Character {
    constructor(scene, start) {
      this.pos = { x: start.x, z: start.z };
      this.facing = 0;
      this.group = new THREE.Group();
      const mk = (w, h, d, color) => {
        const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color, roughness: 0.7 }));
        m.castShadow = true; return m;
      };
      this.head = mk(0.4, 0.4, 0.4, '#ffd6b0'); this.head.position.y = 1.55;
      this.body = mk(0.5, 0.7, 0.3, ORANGE);    this.body.position.y = 0.90;
      this.legL = mk(0.2, 0.5, 0.25, '#2d2d44'); this.legL.position.set(-0.13, 0.30, 0);
      this.legR = mk(0.2, 0.5, 0.25, '#2d2d44'); this.legR.position.set( 0.13, 0.30, 0);
      this.armL = mk(0.18, 0.5, 0.2, ORANGE);   this.armL.position.set(-0.38, 0.85, 0);
      this.armR = mk(0.18, 0.5, 0.2, ORANGE);   this.armR.position.set( 0.38, 0.85, 0);
      [this.head, this.body, this.legL, this.legR, this.armL, this.armR].forEach(m => this.group.add(m));
      this.group.position.set(start.x, 0, start.z);
      scene.add(this.group);
    }

    faceDirection(rot) { this.facing = Math.atan2(rot.x, rot.z); }
    faceNormalInward(slot) { this.facing = Math.atan2(-slot.nx, -slot.nz); }

    walk(t, scale = 1) {
      const s = Math.sin(t * 8) * 0.4 * scale;
      this.armL.rotation.x = s; this.armR.rotation.x = -s;
      this.legL.rotation.x = -s; this.legR.rotation.x = s;
      this.head.position.y = 1.55 + Math.sin(t * 16) * 0.015;
      this.head.rotation.y = 0;
    }
    idle(t) {
      this.armL.rotation.x = this.armR.rotation.x = this.legL.rotation.x = this.legR.rotation.x = 0;
      this.head.rotation.y = Math.sin(t) * 0.05;
    }
    paint(t) {
      this.legL.rotation.x = this.legR.rotation.x = this.armL.rotation.x = 0;
      this.armR.rotation.x = Math.sin(t * 6) * 0.6 - 0.3;
      this.head.rotation.y = 0;
    }

    sync() {
      this.group.rotation.y = lerpAngle(this.group.rotation.y, this.facing, 0.15);
      this.group.position.set(this.pos.x, 0, this.pos.z);
    }
  }

  // ==========================================================================
  //  MURAL FACTORY — prompt, fetch (with timeout), sanitize, rasterize, apply
  // ==========================================================================
  class MuralFactory {
    constructor(scene, renderer) {
      this.scene = scene;
      this.maxAniso = renderer.capabilities.getMaxAnisotropy();
    }

    _aspectDesc(slot) {
      const r = slot.wallH / slot.wallW;
      if (r > 1.3) return 'tall portrait';
      if (1 / r > 1.3) return 'wide landscape';
      return 'roughly square';
    }

    _prompt(slot, index) {
      const PW = 512;
      const PH = Math.round(512 * (slot.wallH / slot.wallW));
      const text =
`You are MURO, an autonomous AI street artist with a distinctive visual voice.

This is mural #${index}. Use (${index} % 8) to select your style:
STYLE 0 — BAUHAUS: rigid geometry, bold primary palette + black/white, asymmetric balance
STYLE 1 — ORGANIC: biomorphic flowing shapes, earthy palette with vivid accents
STYLE 2 — PIXEL: strict grid, retro 8-color palette, hard pixel edges
STYLE 3 — OP-ART: tessellated pattern, optical illusion depth, high-contrast B&W + one accent
STYLE 4 — SURREAL: impossible scale, dreamlike juxtapositions, rich saturated 6-color palette
STYLE 5 — GRAFFITI: letterforms dissolved into abstract shapes, spray-paint gradients, urban energy
STYLE 6 — COSMOS: nebulae, planets, star fields, deep space gradients, bioluminescent accents
STYLE 7 — BOTANICAL: stylized flora, organic tessellation, seasonal palette

The wall is ${slot.wallW.toFixed(1)}m wide and ${slot.wallH.toFixed(1)}m tall (${this._aspectDesc(slot)}).

Return your response in EXACTLY this format and nothing else:
THOUGHT: <one sentence, 7-12 words, your raw poetic inner monologue about this wall or the city; no quotes, no trailing punctuation, do not start with "I">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${PW} ${PH}" width="${PW}" height="${PH}">...</svg>

HARD RULES for the SVG:
- Allowed elements: rect circle ellipse polygon polyline path line defs linearGradient radialGradient stop g
- FORBIDDEN: text image use symbol script foreignObject and any href/xlink/url() external references
- First element MUST be a full-bleed background rect covering the whole viewBox
- Include at least 2 gradient definitions in <defs>
- Use at least 5 distinct colors; fill the entire canvas, no raw white space
- Maximum 35 shape elements (excluding <defs> children)
- Output ONLY the THOUGHT line then the raw SVG. No markdown fences, no comments, no explanation.`;
      return { PW, PH, text };
    }

    _parse(raw) {
      let thought = 'a wall is a question the city forgot to ask';
      const tm = raw.match(/THOUGHT:\s*(.+)/i);
      if (tm) thought = tm[1].split('\n')[0].trim().replace(/^["']|["']$/g, '');
      const start = raw.indexOf('<svg');
      const end = raw.lastIndexOf('</svg>');
      const svg = (start !== -1 && end !== -1) ? raw.slice(start, end + 6) : null;
      return { thought, svg };
    }

    _validateSvg(svg) {
      if (!svg) throw new Error('no_svg');
      if (svg.length > CONFIG.maxSvgBytes) throw new Error('svg_too_large');
      if (SVG_FORBIDDEN.test(svg)) throw new Error('svg_unsafe');
      return svg;
    }

    async generate(slot, index) {
      const { PW, PH, text } = this._prompt(slot, index);

      if (!CONFIG.workerUrl) {
        await new Promise(r => setTimeout(r, rand(700, 1300)));
        return { thought: DEMO_THOUGHTS[index % DEMO_THOUGHTS.length], svg: demoSVG(PW, PH, index), PW, PH };
      }

      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), CONFIG.requestTimeoutMs);
      try {
        const res = await fetch(CONFIG.workerUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: CONFIG.model, max_tokens: CONFIG.maxTokens, temperature: 1, messages: [{ role: 'user', content: text }] }),
          signal: ctrl.signal,
        });
        if (res.status === 429) throw new Error('rate_limited');
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || 'api_error');
        const raw = data && data.content && data.content[0] && data.content[0].text;
        if (!raw) throw new Error('empty_response');
        const parsed = this._parse(raw);
        this._validateSvg(parsed.svg);
        return { ...parsed, PW, PH };
      } finally {
        clearTimeout(timer);
      }
    }

    // Rasterize SVG -> CanvasTexture -> plane aligned to the wall.
    apply(slot, result) {
      return new Promise((resolve, reject) => {
        const blob = new Blob([result.svg], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        const fail = (e) => { URL.revokeObjectURL(url); reject(e instanceof Error ? e : new Error('svg_render_failed')); };
        img.onerror = fail;
        img.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = result.PW; canvas.height = result.PH;
            canvas.getContext('2d').drawImage(img, 0, 0, result.PW, result.PH);
            URL.revokeObjectURL(url);

            const tex = new THREE.CanvasTexture(canvas);
            tex.needsUpdate = true;
            tex.anisotropy = this.maxAniso;

            const plane = new THREE.Mesh(
              new THREE.PlaneGeometry(slot.wallW * CONFIG.muralCoverW, slot.wallH * CONFIG.muralCoverH),
              new THREE.MeshStandardMaterial({ map: tex, roughness: 0.4 })
            );
            if (slot.nz === 1) plane.rotation.y = 0;
            else if (slot.nz === -1) plane.rotation.y = Math.PI;
            else if (slot.nx === 1) plane.rotation.y = Math.PI / 2;
            else plane.rotation.y = -Math.PI / 2;
            plane.position.set(slot.px + slot.nx * 0.02, slot.py, slot.pz + slot.nz * 0.02);

            this.scene.add(plane);
            slot.mesh = plane;
            resolve();
          } catch (e) { fail(e); }
        };
        img.src = url;
      });
    }
  }

  // ==========================================================================
  //  UI — thin wrapper over the overlay DOM
  // ==========================================================================
  const UI = {
    statusLabel: document.getElementById('status-label'),
    counterNum: document.getElementById('counter-num'),
    logBody: document.getElementById('log-body'),
    thought: document.getElementById('thought'),
    thoughtText: document.getElementById('thought-text'),
    flash: document.getElementById('flash'),
    boot: document.getElementById('boot'),
    bootSub: document.getElementById('boot-sub'),

    status(text) { this.statusLabel.textContent = text; },
    counter(n) { this.counterNum.textContent = n; },
    setThought(t) { this.thoughtText.textContent = t; this.thought.classList.add('show'); },
    hideThought() { this.thought.classList.remove('show'); },
    setFlash(on) { this.flash.classList.toggle('on', on); },
    hideBoot() { this.boot.classList.add('hide'); },
    bootError(msg) { this.boot.classList.add('error'); this.bootSub.textContent = msg; },
    pushLog(index, slot) {
      const empty = this.logBody.querySelector('.empty');
      if (empty) empty.remove();
      const e = document.createElement('div');
      e.className = 'entry';
      e.innerHTML = `<span class="n">#${String(index + 1).padStart(3, '0')}</span> ${CONFIG.styleNames[index % 8]}` +
                    `<div class="meta">${slot.wallW.toFixed(1)}×${slot.wallH.toFixed(1)}m · building ${slot.buildingIdx + 1}</div>`;
      this.logBody.prepend(e);
      while (this.logBody.children.length > CONFIG.maxLogEntries) this.logBody.lastChild.remove();
    },
  };

  // ==========================================================================
  //  AGENT — the 5-state brain
  // ==========================================================================
  const STATE = { WANDERING: 'WANDERING', MOVING_TO_WALL: 'MOVING_TO_WALL', THINKING: 'THINKING', PAINTING: 'PAINTING', CONTEMPLATING: 'CONTEMPLATING' };
  const STATUS_TEXT = {
    WANDERING: 'wandering the streets',
    MOVING_TO_WALL: 'approaching a blank wall',
    THINKING: 'imagining a mural',
    PAINTING: 'painting…',
    CONTEMPLATING: 'every wall is painted · contemplating',
  };

  class Agent {
    constructor(city, character, factory) {
      this.city = city;
      this.char = character;
      this.factory = factory;
      this.muralCount = 0;
      this._setState(STATE.WANDERING);
      this._newWanderTarget();
    }

    _setState(s) { this.state = s; UI.status(STATUS_TEXT[s]); }

    _newWanderTarget() {
      this.wanderTarget = this.city.randomReachablePoint();
      this.wanderTimer = 0;
      this.wanderDeadline = CONFIG.wanderMin + Math.random() * CONFIG.wanderRange;
    }

    _beginThinking() {
      this._setState(STATE.THINKING);
      this.thinkTimer = 0;
      this.char.faceNormalInward(this.currentSlot);
      this._startGeneration();
    }

    _startGeneration() {
      if (this.apiPending) return;
      this.apiPending = true;
      this.pendingResult = null;
      const slot = this.currentSlot;
      const index = this.muralCount;
      // Reserve the slot up-front so another decision can't target it.
      slot.used = true;
      this.factory.generate(slot, index)
        .then(result => { this.pendingResult = result; UI.setThought(result.thought); })
        .catch(err => { this.pendingResult = null; console.warn('[muralist] generation failed:', err.message); })
        .finally(() => { this.apiPending = false; });
    }

    async _finishPainting() {
      const slot = this.currentSlot;
      const index = this.muralCount;
      try {
        await this.factory.apply(slot, this.pendingResult);
        this.muralCount++;
        UI.counter(this.muralCount);
        UI.pushLog(index, slot);
      } catch (e) {
        slot.used = false; // release on failure so it can be retried
        console.warn('[muralist] apply failed:', e.message);
      }
      this._returnToWander();
    }

    _releaseSlot() {
      if (this.currentSlot) this.currentSlot.used = false; // generation failed: free it
      this._returnToWander();
    }

    _returnToWander() {
      UI.setFlash(false);
      UI.hideThought();
      this.pendingResult = null;
      this.currentSlot = null;
      this._newWanderTarget();
      this._setState(STATE.WANDERING);
    }

    update(dt, t) {
      const speedStep = CONFIG.moveSpeed * dt;
      switch (this.state) {
        case STATE.WANDERING: {
          this.wanderTimer += dt;
          const moved = this.city.steer(this.char.pos, this.wanderTarget, speedStep);
          if (moved) this.char.faceDirection(moved);
          const reached = Math.hypot(this.wanderTarget.x - this.char.pos.x, this.wanderTarget.z - this.char.pos.z) < 0.6;
          if (reached || !moved) this._newWanderTarget();

          if (this.wanderTimer > this.wanderDeadline) {
            const slot = this.city.pickFreeSlot();
            if (slot) { this.currentSlot = slot; this._setState(STATE.MOVING_TO_WALL); }
            else if (this.city.allWallsUsed()) this._setState(STATE.CONTEMPLATING);
            else this._newWanderTarget();
          }
          this.char.walk(t);
          break;
        }
        case STATE.MOVING_TO_WALL: {
          const ap = this.city.approachPoint(this.currentSlot);
          const moved = this.city.steer(this.char.pos, ap, speedStep);
          if (moved) this.char.faceDirection(moved);
          const dist = Math.hypot(ap.x - this.char.pos.x, ap.z - this.char.pos.z);
          if (dist < 0.2 || !moved) this._beginThinking();
          this.char.walk(t);
          break;
        }
        case STATE.THINKING: {
          this.thinkTimer += dt;
          this.char.idle(t);
          if (this.thinkTimer > CONFIG.thinkSeconds && !this.apiPending) {
            if (this.pendingResult && this.pendingResult.svg) {
              this._setState(STATE.PAINTING); this.paintTimer = 0; UI.setFlash(true);
            } else {
              this._releaseSlot();
            }
          }
          break;
        }
        case STATE.PAINTING: {
          this.paintTimer += dt;
          this.char.paint(t);
          if (this.paintTimer > CONFIG.paintSeconds) this._finishPainting();
          break;
        }
        case STATE.CONTEMPLATING: {
          const moved = this.city.steer(this.char.pos, this.wanderTarget, speedStep * 0.6);
          if (moved) this.char.faceDirection(moved);
          const reached = Math.hypot(this.wanderTarget.x - this.char.pos.x, this.wanderTarget.z - this.char.pos.z) < 0.6;
          if (reached || !moved) this.wanderTarget = this.city.randomReachablePoint();
          this.char.walk(t, 0.6);
          break;
        }
      }
      this.char.sync();
    }
  }

  // ==========================================================================
  //  CAMERA RIG — slow cinematic orbit
  // ==========================================================================
  class CameraRig {
    constructor(camera, target) {
      this.camera = camera;
      this.angle = 0;
      this.center = new THREE.Vector3(target.x, 0, target.z);
    }
    update(dt, target) {
      this.angle += dt * CONFIG.camOrbitSpeed;
      this.center.lerp(new THREE.Vector3(target.x, 0, target.z), CONFIG.camFollowLerp);
      this.camera.position.set(
        this.center.x + Math.cos(this.angle) * CONFIG.camDistance,
        CONFIG.camHeight,
        this.center.z + Math.sin(this.angle) * CONFIG.camDistance
      );
      this.camera.lookAt(this.center.x, 2, this.center.z);
    }
  }

  // ==========================================================================
  //  APP — bootstrap + main loop
  // ==========================================================================
  class App {
    constructor() {
      if (typeof THREE === 'undefined') {
        UI.bootError('failed to load Three.js — check your connection');
        throw new Error('THREE not loaded');
      }
      this.scene = new THREE.Scene();
      this.scene.background = new THREE.Color(CONFIG.sky);
      this.scene.fog = new THREE.Fog(CONFIG.fog.color, CONFIG.fog.near, CONFIG.fog.far);

      this.camera = new THREE.PerspectiveCamera(CONFIG.camFov, innerWidth / innerHeight, 0.1, 500);

      this.renderer = new THREE.WebGLRenderer({ antialias: true });
      this.renderer.setSize(innerWidth, innerHeight);
      this.renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      this.renderer.shadowMap.enabled = true;
      this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.getElementById('app').appendChild(this.renderer.domElement);

      this._lights();

      this.city = new City(this.scene);
      this.character = new Character(this.scene, { x: 0, z: 14 });
      this.factory = new MuralFactory(this.scene, this.renderer);
      this.agent = new Agent(this.city, this.character, this.factory);
      this.rig = new CameraRig(this.camera, this.character.pos);

      this.clock = new THREE.Clock();
      this.booted = false;
      this.running = true;

      addEventListener('resize', () => this._onResize());
      document.addEventListener('visibilitychange', () => this._onVisibility());

      this._loop = this._loop.bind(this);
      requestAnimationFrame(this._loop);
    }

    _lights() {
      const sun = new THREE.DirectionalLight('#fff5e0', 1.8);
      sun.position.set(50, 80, 30);
      sun.castShadow = true;
      sun.shadow.mapSize.set(2048, 2048);
      Object.assign(sun.shadow.camera, { near: 1, far: 200, left: -70, right: 70, top: 70, bottom: -70 });
      sun.shadow.bias = -0.0004;
      this.scene.add(sun);
      this.scene.add(new THREE.AmbientLight('#c9dff0', 0.9));
      this.scene.add(new THREE.HemisphereLight('#87CEEB', '#6b8e6b', 0.4));
    }

    _onResize() {
      this.camera.aspect = innerWidth / innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(innerWidth, innerHeight);
    }

    // Pause the loop while the tab is hidden — saves GPU and avoids a huge dt spike.
    _onVisibility() {
      this.running = !document.hidden;
      if (this.running) { this.clock.getDelta(); requestAnimationFrame(this._loop); }
    }

    _loop() {
      if (!this.running) return;
      requestAnimationFrame(this._loop);
      const dt = Math.min(this.clock.getDelta(), 0.05);
      const t = this.clock.elapsedTime;
      this.agent.update(dt, t);
      this.rig.update(dt, this.character.pos);
      this.renderer.render(this.scene, this.camera);
      if (!this.booted) {
        this.booted = true;
        UI.status(STATUS_TEXT.WANDERING);
        setTimeout(() => UI.hideBoot(), 400);
      }
    }
  }

  // ==========================================================================
  //  OFFLINE DEMO ASSETS (used only when CONFIG.workerUrl === null)
  // ==========================================================================
  const DEMO_THOUGHTS = [
    'this grey wall has been holding its breath for years',
    'concrete forgets but paint insists on remembering',
    'every blank surface is a confession waiting to happen',
    'the city built walls then begged someone to break them',
    'color is the only language this street still understands',
    'silence here is just noise that finally gave up',
    'walls remember everything cities try to forget',
    'somewhere under this primer a sunset is trying to escape',
  ];
  function demoSVG(PW, PH, i) {
    const palettes = [
      ['#ff6b35','#004e89','#ffd23f','#1a1a2e','#f7f7ff'],
      ['#2d6a4f','#95d5b2','#d8f3dc','#ffb703','#fb8500'],
      ['#e63946','#f1faee','#a8dadc','#457b9d','#1d3557'],
      ['#7209b7','#3a0ca3','#4361ee','#4cc9f0','#f72585'],
    ];
    const p = palettes[i % palettes.length];
    const r = Math.random;
    let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${PW} ${PH}" width="${PW}" height="${PH}">`;
    s += `<defs><linearGradient id="g${i}" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="${p[0]}"/><stop offset="1" stop-color="${p[3]}"/></linearGradient>` +
         `<radialGradient id="r${i}"><stop offset="0" stop-color="${p[2]}"/><stop offset="1" stop-color="${p[4]}"/></radialGradient></defs>`;
    s += `<rect width="${PW}" height="${PH}" fill="url(#g${i})"/>`;
    for (let k = 0; k < 16; k++) {
      const c = p[k % p.length];
      const type = k % 3;
      if (type === 0) s += `<circle cx="${r()*PW}" cy="${r()*PH}" r="${20+r()*90}" fill="${c}" opacity="${0.4+r()*0.5}"/>`;
      else if (type === 1) s += `<rect x="${r()*PW}" y="${r()*PH}" width="${30+r()*120}" height="${30+r()*120}" fill="${c}" opacity="${0.4+r()*0.5}" transform="rotate(${r()*90} ${r()*PW} ${r()*PH})"/>`;
      else { const x=r()*PW,y=r()*PH; s += `<polygon points="${x},${y} ${x+60+r()*80},${y+20} ${x+30},${y+90+r()*60}" fill="${c}" opacity="${0.4+r()*0.5}"/>`; }
    }
    s += `<circle cx="${PW*0.5}" cy="${PH*0.5}" r="${PW*0.18}" fill="url(#r${i})" opacity="0.85"/></svg>`;
    return s;
  }

  // --- go ---
  try { new App(); }
  catch (e) { console.error('[muralist] fatal:', e); }

  })();
  </script>
</body>
</html>
